<article class="comment-item">
  <div class="comment-avatar">{{ comment.author.username.slice(0, 1).toUpperCase() }}</div>

  <div class="comment-body">
    <header>
      <strong>{{ comment.author.displayName || comment.author.username }}</strong>
      <span>@{{ comment.author.username }} · {{ comment.createdAt | relativeDate }}</span>
      @if (isAuthor) {
        <div class="comment-actions desktop-actions">
          <button type="button" (click)="startEdit()">{{ 'comment.edit' | translate }}</button>
          <button type="button" (click)="remove()">{{ 'comment.delete' | translate }}</button>
        </div>
        <div class="comment-actions mobile-actions">
          <button type="button" class="menu-trigger" (click)="menuOpen.set(!menuOpen())">...</button>
          @if (menuOpen()) {
            <div class="dropdown-menu">
              <button type="button" (click)="startEdit(); menuOpen.set(false)">{{ 'comment.edit' | translate }}</button>
              <button type="button" (click)="remove(); menuOpen.set(false)">{{ 'comment.delete' | translate }}</button>
            </div>
          }
        </div>
      }
    </header>

    @if (editing()) {
      <form [formGroup]="form" (ngSubmit)="save()" class="edit-form">
        <textarea formControlName="content" rows="3"></textarea>
        <div class="edit-actions">
          <button type="submit" [disabled]="form.invalid || loading()">
            {{ 'common.save' | translate }}
          </button>
          <button type="button" (click)="cancelEdit()">{{ 'common.cancel' | translate }}</button>
        </div>
      </form>
    } @else {
      <p>{{ comment.content }}</p>
    }
  </div>
</article>
