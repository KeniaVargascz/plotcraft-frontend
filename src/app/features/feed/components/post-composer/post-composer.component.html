<section class="composer-card" data-testid="post-composer">
  <header>
    <h2>{{ 'feed.new' | translate }}</h2>
    <span>{{ 'post.charCount' | translate: { current: contentLength, max: 5000 } }}</span>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <textarea
      formControlName="content"
      rows="5"
      [placeholder]="'post.placeholder' | translate"
    ></textarea>

    <app-tag-chips-input
      [tags]="tags()"
      [maxTags]="10"
      [placeholder]="'feed.composer.tagsPlaceholder' | translate"
      (tagsChange)="onTagsChange($event)"
    />

    <div class="image-section">
      @if (imageUrls().length) {
        <div class="image-previews">
          @for (url of imageUrls(); track url; let i = $index) {
            <div class="image-preview">
              <img [src]="url" alt="Preview" />
              <button type="button" class="remove-image" (click)="removeImage(i)">&times;</button>
            </div>
          }
        </div>
      }

      @if (canAddImages) {
        <div class="image-url-row">
          <button type="button" class="add-image-btn" (click)="toggleImageInput()">
            {{ showImageInput() ? 'Ocultar' : 'Adjuntar imagen (URL)' }}
          </button>
        </div>
      }

      @if (showImageInput() && canAddImages) {
        <div class="image-url-input-row">
          <input
            type="text"
            [(ngModel)]="imageUrlInput"
            [ngModelOptions]="{ standalone: true }"
            (keydown.enter)="$event.preventDefault(); addImageUrl()"
            placeholder="https://ejemplo.com/imagen.jpg"
            class="image-url-input"
          />
          <button type="button" class="add-url-btn" (click)="addImageUrl()">Agregar</button>
        </div>
      }
    </div>

    <div class="composer-actions">
      <label>
        <span>{{ 'feed.title' | translate }}</span>
        <select formControlName="type">
          @for (type of postTypes; track type) {
            <option [value]="type">{{ ('post.types.' + type) | translate }}</option>
          }
        </select>
      </label>

      <button type="submit" [disabled]="form.invalid || publishing()" data-testid="publish-post">
        {{ publishing() ? ('post.publishing' | translate) : ('post.publish' | translate) }}
      </button>
    </div>
  </form>

  @if (error()) {
    <app-error-message [message]="error()! | translate" />
  }
</section>
