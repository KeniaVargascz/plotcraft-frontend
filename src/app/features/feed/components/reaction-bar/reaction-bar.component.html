<div class="reaction-bar">
  <button
    type="button"
    class="reaction-toggle"
    data-testid="reaction-btn"
    [class.active]="post.viewerContext?.hasReacted"
    [disabled]="loading()"
    (click)="toggle('LIKE')"
  >
    {{ 'post.reactions.like' | translate }} ·
    <span data-testid="reaction-count">{{ post.stats.reactionsCount }}</span>
  </button>

  <div class="reaction-chips">
    @for (option of reactionOptions; track option.type) {
      @if (
        post.stats.reactionsSummary[option.type] > 0 ||
        post.viewerContext?.reactionType === option.type
      ) {
        <button
          type="button"
          class="chip"
          data-testid="reaction-btn"
          [class.active]="post.viewerContext?.reactionType === option.type"
          [disabled]="loading()"
          (click)="toggle(option.type)"
        >
          <span>{{ option.emoji }}</span>
          <span data-testid="count">{{ post.stats.reactionsSummary[option.type] }}</span>
        </button>
      }
    }
  </div>
</div>
