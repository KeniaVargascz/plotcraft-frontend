<div class="reaction-bar">
  @if (!isAuthor) {
    <button
      type="button"
      class="reaction-toggle"
      data-testid="reaction-btn"
      [class.active]="post.viewerContext?.hasReacted"
      [disabled]="loading()"
      (click)="toggle('LIKE')"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" [attr.fill]="post.viewerContext?.hasReacted ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span data-testid="reaction-count">{{ post.stats.reactionsCount }}</span>
    </button>

    <div class="reaction-chips">
      @for (option of reactionOptions; track option.type) {
        @if (
          post.stats.reactionsSummary[option.type] > 0 ||
          post.viewerContext?.reactionType === option.type
        ) {
          <button
            type="button"
            class="chip"
            data-testid="reaction-btn"
            [class.active]="post.viewerContext?.reactionType === option.type"
            [disabled]="loading()"
            (click)="toggle(option.type)"
          >
            <span>{{ option.emoji }}</span>
            <span data-testid="count">{{ post.stats.reactionsSummary[option.type] }}</span>
          </button>
        }
      }
    </div>
  } @else {
    <span class="reactions-count">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      {{ post.stats.reactionsCount }}
    </span>
  }

  <ng-content />
</div>
