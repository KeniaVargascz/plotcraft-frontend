<mat-card class="danger-card">
  <h1>{{ 'account.delete.title' | translate }}</h1>
  <p>{{ 'account.delete.subtitle' | translate }}</p>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline">
      <mat-label>{{ 'account.fields.currentPassword' | translate }}</mat-label>
      <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password" />
      <button
        type="button"
        matSuffix
        mat-icon-button
        (click)="showPassword = !showPassword"
        [attr.aria-label]="showPassword ? 'Ocultar' : 'Mostrar'"
        class="eye-toggle"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          @if (showPassword) {
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
            />
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
            <line x1="1" y1="1" x2="23" y2="23" />
          } @else {
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          }
        </svg>
      </button>
    </mat-form-field>

    <button mat-flat-button type="submit" [disabled]="form.invalid || loading()">
      {{ 'account.delete.confirm' | translate }}
    </button>
  </form>
</mat-card>
