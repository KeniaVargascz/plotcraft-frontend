<section class="follow-list">
  <header>
    <h1>{{ 'profile.following' | translate }}</h1>
  </header>

  @if (loading()) {
    <app-list-skeleton />
  } @else if (users().length === 0) {
    <app-empty-state icon="👥" [title]="'profile.noFollowingYet' | translate" />
  } @else {
    @for (user of users(); track user.id) {
      <article class="follow-card">
        <a [routerLink]="['/perfil', user.username]">
          <strong>{{ user.displayName || user.username }}</strong>
          <span>@{{ user.username }}</span>
        </a>
        <button type="button" (click)="toggleFollow(user)">
          {{ user.isFollowing ? ('profile.unfollow' | translate) : ('profile.follow' | translate) }}
        </button>
      </article>
    }
  }

  @if (hasMore()) {
    <button type="button" class="load-more" (click)="load(false)">
      {{ 'feed.loadMore' | translate }}
    </button>
  }
</section>
