<app-info-banner />
<div class="public-shell">
  <header class="public-header">
    <a routerLink="/" class="brand">{{ 'app.name' | translate }}</a>
    <nav>
      <a routerLink="/novelas" routerLinkActive="active">{{ 'nav.novels' | translate }}</a>
      <a routerLink="/mundos" routerLinkActive="active">{{ 'nav.worlds' | translate }}</a>
      <a routerLink="/personajes" routerLinkActive="active">{{ 'nav.characters' | translate }}</a>
      <a routerLink="/descubrir" routerLinkActive="active">{{ 'nav.discovery' | translate }}</a>
    </nav>
    <nav class="auth-links">
      <a routerLink="/login" routerLinkActive="active">{{ 'nav.login' | translate }}</a>
      @if (canRegister()) {
        <a routerLink="/register" routerLinkActive="active">{{ 'nav.register' | translate }}</a>
      }
    </nav>
  </header>

  <main>
    <router-outlet />
  </main>
</div>
