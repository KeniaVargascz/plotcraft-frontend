<div class="select-wrapper">
  <button
    type="button"
    class="select-trigger"
    [class.open]="open()"
    [attr.aria-expanded]="open()"
    aria-haspopup="listbox"
    (click)="toggle()"
  >
    <span class="select-label">{{ selectedLabel }}</span>
    <svg class="select-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
  </button>

  @if (open()) {
    <ul class="select-dropdown" role="listbox">
      @for (option of options; track option.value) {
        <li
          role="option"
          [class.selected]="option.value === value"
          [attr.aria-selected]="option.value === value"
          (click)="select(option)"
        >
          {{ option.label }}
        </li>
      }
    </ul>
  }
</div>
