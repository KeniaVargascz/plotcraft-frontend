<section class="strength-card" [class.weak]="tone === 'weak'" [class.medium]="tone === 'medium'" [class.strong]="tone === 'strong'">
  <div class="strength-header">
    <span>{{ 'auth.passwordStrength.title' | translate }}</span>
    <strong>{{ label | translate }}</strong>
  </div>

  <div class="strength-bar" aria-hidden="true">
    <span [style.width.%]="score * 20"></span>
  </div>

  <ul class="rules">
    @for (rule of rules; track rule.key) {
      <li [class.passed]="rule.passed">
        <span class="rule-dot"></span>
        <span>{{ rule.label | translate }}</span>
      </li>
    }
  </ul>
</section>
