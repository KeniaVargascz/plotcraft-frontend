<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PlotCraft</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://plotcraft-backend.onrender.com" />
    <link rel="dns-prefetch" href="https://plotcraft-backend.onrender.com" />
    <style>
      .splash{position:fixed;inset:0;z-index:9999;display:grid;place-items:center;background:#09070a;font-family:system-ui,-apple-system,sans-serif;transition:opacity .3s}
      .splash.fade-out{opacity:0;pointer-events:none}
      .splash-inner{text-align:center}
      .splash-logo{font-size:1.8rem;font-weight:700;color:#c9a84c;letter-spacing:.04em;margin-bottom:1.2rem}
      .splash-bar{width:140px;height:3px;background:rgba(201,168,76,.15);border-radius:3px;margin:0 auto;overflow:hidden;position:relative}
      .splash-bar::after{content:'';position:absolute;left:-40%;top:0;height:100%;width:40%;background:#c9a84c;border-radius:3px;animation:slide 1s ease-in-out infinite}
      @keyframes slide{to{left:100%}}
    </style>
  </head>
  <body>
    <app-root>
      <div class="splash" id="splash">
        <div class="splash-inner">
          <div class="splash-logo">PlotCraft</div>
          <div class="splash-bar"></div>
        </div>
      </div>
    </app-root>
  </body>
</html>
